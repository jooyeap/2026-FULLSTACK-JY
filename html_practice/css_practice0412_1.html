<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0412 CSS 연습 1</title>
    <style>
        *{margin: 0; padding: 0;}

        body{
            background-color: #F7FAFC;

        }

        .container{
            display: flex;
            margin: 20px auto;
            padding: 20px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card{
            background-color: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 15px;
            padding: 10px 20px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            width: 20%;
            box-sizing: border-box;
            flex: 0 1 calc(25% - 15px);
        }

        .card h2{
            color: #4a5568;
            font-size: 14px;
            font-weight: 500;
        }

        img{
            margin-right: 5px;
        }

        .card-count{color: #1A202C; font-size: 24px; font-weight: bold;}
        .card-rate{color: #38A169; font-size: 12px;}

        .card p:nth-child(1){margin: 10px 10px 10px 0; display: flex;
        align-items: center;}

        /* .card p:nth-child(3){color: #1A202C; font-size: 24px; font-weight: bold;
        .card p:nth-child(4){color: #38A169; font-size: 12px;} */

    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <p><img src="#" alt="#">Users</p>
            <h2>Total Users</h2>
            <p class="card-count">10,245</p>
            <p class="card-rate">+5.3%</p>
        </div>

        <div class="card">
            <p><img img src="#" alt="#">Users</p>

        </div>

            <h2>Total Users</h2>
            <p class="card-count">10,245</p>
            <p class="card-rate">+5.3%</p>
        </div>

        <div class="card">
            <p><img img src="#" alt="#">Users</p>
            <h2>Total Users</h2>
            <p class="card-count">10,245</p>
            <p class="card-rate">+5.3%</p>
        </div>
    </div>
</body>
</html>
